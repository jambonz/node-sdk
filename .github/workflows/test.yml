name: Tests

on:
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: 22

      - name: Install dependencies
        working-directory: typescript
        run: npm ci

      - name: Typecheck
        working-directory: typescript
        run: npm run typecheck

      - name: Run tests
        working-directory: typescript
        run: npm test
